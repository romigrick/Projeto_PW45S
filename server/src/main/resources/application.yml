spring:
  profiles:
    active: dev
  application:
    name: server
  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: giselimatos@alunos.utfpr.edu.br
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8044

springdoc:
  api-docs:
    path: /api-docs

minio:
  endpoint: http://127.0.0.1:9000
  port: 9000
  accessKey: minio@admin
  secretKey: minio@admin
  secure: false
  bucket-name: commons
  imageSize: 10485760
  fileSize: 52428800

logging:
  file:
    name: logs/application.log
  level:
    root: INFO
    br.edu.utfpr.pb.pw45s: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/pw45s
    username: postgres
    password: 123456
  flyway:
    locations: classpath:db/dev

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/pw45s
    username: postgres
    password: 123456
  flyway:
    locations: classpath:db/prod

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/pw45s_test
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false